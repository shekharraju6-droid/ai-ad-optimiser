<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChlearSakhaaOps AI - Set Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #f3f4f6;
            --bg-surface: #ffffff;
            --color-primary: #4f46e5;
            --color-secondary: #0891b2;
            --color-success: #059669;
            --color-danger: #dc2626;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --text-light: #6b7280;
            --border-color: #e5e7eb;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-base); color: var(--text-main); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        h1,h2,h3,h4,.font-outfit { font-family: 'Outfit', sans-serif; }
        .card { background: white; border: 1px solid var(--border-color); border-radius: 16px; padding: 2rem; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .brand { display: flex; align-items: center; gap: 0.75rem; font-size: 1.35rem; font-weight: 800; margin-bottom: 1.5rem; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; }
        h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.4rem; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.25rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.35rem; }
        .form-group input { width: 100%; padding: 0.6rem; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.9rem; font-family: 'Inter', sans-serif; }
        .form-group input:focus { outline: none; border-color: var(--color-primary); }
        .btn { padding: 0.65rem 1rem; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: 1px solid transparent; display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem; transition: 0.15s; text-decoration: none; width: 100%; }
        .btn-primary { background: var(--color-primary); color: white; }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .info-row { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.4rem; padding: 0.4rem 0; border-bottom: 1px solid var(--border-color); }
        .info-row span:last-child { font-weight: 600; color: var(--text-main); }
        .error { color: var(--color-danger); font-size: 0.85rem; margin-top: 0.75rem; text-align: center; }
        .success { color: var(--color-success); font-size: 0.85rem; margin-top: 0.75rem; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand"><div class="logo-icon">CS</div>ChlearSakhaaOps AI</div>
        <h2>Set Your Password</h2>
        <p class="subtitle">Welcome! Create a secure password to activate your account.</p>

        <div id="loading" class="subtitle">Validating your setup link...</div>

        <div id="formArea" class="hidden">
            <div class="info-row"><span>Email</span><span id="emailDisplay">-</span></div>
            <div class="info-row"><span>Name</span><span id="nameDisplay">-</span></div>
            <div class="info-row"><span>Role</span><span id="roleDisplay">-</span></div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Minimum 6 characters">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Re-enter password">
            </div>
            <button class="btn btn-primary" id="saveBtn" onclick="setPassword()">Activate Account</button>
            <div id="message" class="error hidden"></div>
        </div>
    </div>

    <script>
    const API = '/api';
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    function $(id) { return document.getElementById(id); }

    function _setSaving(btn, text) {
        if (!btn) return;
        if (!btn.dataset.originalText) btn.dataset.originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = text || 'Saving...';
    }
    function _resetSaving(btn) {
        if (!btn) return;
        btn.disabled = false;
        if (btn.dataset.originalText) {
            btn.textContent = btn.dataset.originalText;
            delete btn.dataset.originalText;
        }
    }

    async function api(method, path, body) {
        const opts = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(API + path, opts);
        if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.detail || `Request failed (${res.status})`);
        }
        return res.json();
    }

    async function init() {
        if (!token) {
            $('loading').textContent = 'Invalid setup link. Please request a new invitation.';
            return;
        }
        try {
            const data = await api('GET', '/auth/onboard/' + encodeURIComponent(token));
            $('emailDisplay').textContent = data.email || '-';
            $('nameDisplay').textContent = data.full_name || '-';
            $('roleDisplay').textContent = (data.role === 'user' ? 'BM (User)' : data.role) || '-';
            $('loading').classList.add('hidden');
            $('formArea').classList.remove('hidden');
        } catch (e) {
            $('loading').textContent = e.message || 'Invalid or expired setup link.';
        }
    }

    async function setPassword() {
        const btn = (typeof event !== 'undefined' && event) ? event.target : null;
        _setSaving(btn, 'Activating...');
        try {
            const password = $('password').value;
            const confirm = $('confirmPassword').value;
            const msg = $('message');
            msg.classList.add('hidden');
            if (!password || password.length < 6) {
                msg.textContent = 'Password must be at least 6 characters.';
                msg.className = 'error';
                msg.classList.remove('hidden');
                return;
            }
            if (password !== confirm) {
                msg.textContent = 'Passwords do not match.';
                msg.className = 'error';
                msg.classList.remove('hidden');
                return;
            }
            const data = await api('POST', '/auth/onboard/' + encodeURIComponent(token), { password });
            msg.textContent = 'Account activated! Redirecting to dashboard...';
            msg.className = 'success';
            msg.classList.remove('hidden');
            localStorage.setItem('adoptima_token', data.access_token);
            setTimeout(() => { window.location.href = '/'; }, 1200);
        } catch (e) {
            const msg = $('message');
            msg.textContent = e.message || 'Failed to activate account.';
            msg.className = 'error';
            msg.classList.remove('hidden');
        } finally {
            _resetSaving(btn);
        }
    }

    init();
    </script>
</body>
</html>
