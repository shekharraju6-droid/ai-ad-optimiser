<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChlearSakhaaOps AI - Integrations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg-base:#f3f4f6;--bg-surface:#fff;--bg-sidebar:#f9fafb;--border:#e5e7eb;--primary:#4f46e5;--primary-light:#e0e7ff;--success:#059669;--warning:#d97706;--danger:#dc2626;--text-main:#1f2937;--text-muted:#4b5563;--text-light:#6b7280}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:var(--bg-base);color:var(--text-main);height:100vh;overflow:hidden;display:flex}
        h1,h2,h3,h4,.font-outfit{font-family:'Outfit',sans-serif}
        ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:rgba(0,0,0,.03)}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px}
        .topbar{height:64px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;position:fixed;top:0;left:0;right:0;z-index:50}
        .brand{display:flex;align-items:center;gap:.6rem;font-size:1.15rem;font-weight:800;text-decoration:none;color:var(--text-main)}
        .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),#0891b2);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.85rem}
        .topbar-right{display:flex;align-items:center;gap:1rem}
        .btn{padding:.5rem .9rem;border-radius:6px;font-size:.82rem;font-weight:600;cursor:pointer;border:1px solid transparent;display:inline-flex;align-items:center;gap:.35rem;transition:.15s;text-decoration:none}
        .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{filter:brightness(1.1)}
        .btn-secondary{background:#fff;border-color:var(--border);color:var(--text-muted)}.btn-secondary:hover{background:var(--bg-base);color:var(--text-main)}
        .btn-success{background:var(--success);color:#fff}
        .layout{display:flex;width:100%;margin-top:64px;height:calc(100vh - 64px)}
        .sidebar{width:320px;background:var(--bg-sidebar);border-right:1px solid var(--border);padding:1.5rem;overflow-y:auto}
        .sidebar h2{font-size:1.05rem;margin-bottom:1rem}
        .form-group{margin-bottom:1rem}
        .form-group label{display:block;font-size:.75rem;font-weight:600;color:var(--text-muted);margin-bottom:.25rem}
        .form-group select,.form-group input,.form-group textarea{width:100%;padding:.55rem .75rem;border:1px solid var(--border);border-radius:6px;font-size:.85rem;font-family:'Inter',sans-serif}
        .form-group textarea{min-height:80px;resize:vertical}
        .account-info{background:#fff;border:1px solid var(--border);border-radius:8px;padding:1rem;margin-top:1rem;font-size:.8rem;color:var(--text-muted)}
        .account-info .row{display:flex;justify-content:space-between;margin-bottom:.35rem}
        .main{flex-grow:1;overflow-y:auto;padding:1.5rem}
        .page-title{font-size:1.3rem;font-weight:700;margin-bottom:.25rem}
        .page-sub{color:var(--text-muted);font-size:.85rem;margin-bottom:1.5rem}
        .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
        .int-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.25rem;transition:.15s;cursor:pointer;position:relative}
        .int-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.06);transform:translateY(-2px)}
        .int-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:.75rem}
        .int-card h3{font-size:1rem;font-weight:700;margin-bottom:.25rem}
        .int-card .category{font-size:.72rem;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.5rem}
        .int-card p{font-size:.78rem;color:var(--text-muted);line-height:1.45;margin-bottom:1rem;min-height:2.8rem}
        .status-pill{font-size:.7rem;font-weight:700;padding:.25rem .5rem;border-radius:20px;display:inline-flex;align-items:center;gap:.3rem}
        .status-connected{background:#d1fae5;color:#065f46}.status-pending{background:#fef3c7;color:#92400e}.status-offline{background:#f3f4f6;color:#6b7280}
        .form-panel{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-top:1rem}
        .form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
        .form-grid.full{grid-template-columns:1fr}
        .form-grid .form-group{margin-bottom:0}
        .help-text{font-size:.75rem;color:var(--text-light);margin-top:.25rem}
        .toast{position:fixed;top:1rem;right:1rem;padding:.75rem 1.25rem;border-radius:8px;font-size:.85rem;font-weight:500;z-index:200}
        .toast-success{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}.toast-error{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
        .hidden{display:none !important}
    </style>
</head>
<body>
    <div class="topbar">
        <a href="/" class="brand"><div class="logo-icon">CS</div>ChlearSakhaaOps AI</a>
        <div class="topbar-right">
            <span id="userInfo" style="font-size:.85rem;color:var(--text-muted)">Loading...</span>
            <a href="/" class="btn btn-secondary">Home</a>
        </div>
    </div>

    <div class="layout">
        <div class="sidebar">
            <h2 class="font-outfit">Select Account</h2>
            <div class="form-group">
                <label>Client Account</label>
                <select id="accountSelect" onchange="onAccountChange()"><option value="">— Choose account —</option></select>
            </div>
            <div class="account-info" id="accountInfo" style="display:none">
                <div class="row"><span>Google</span><span id="infoGoogle">—</span></div>
                <div class="row"><span>Meta</span><span id="infoMeta">—</span></div>
                <div class="row"><span>BM</span><span id="infoBM">—</span></div>
            </div>
        </div>

        <div class="main">
            <h1 class="page-title font-outfit">Integrations</h1>
            <p class="page-sub">Connect platforms per account. Select an account, click an integration, enter credentials, and save.</p>

            <div class="cards-grid" id="cardsGrid"></div>

            <div class="form-panel hidden" id="formPanel">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
                    <h2 class="font-outfit" id="formTitle">Integration</h2>
                    <button class="btn btn-secondary" onclick="closeForm()">✕ Close</button>
                </div>
                <p class="page-sub" id="formDesc">Enter credentials below.</p>
                <div class="form-grid" id="formFields"></div>
                <div style="margin-top:1.25rem;display:flex;gap:.5rem;align-items:center">
                    <button class="btn btn-primary" id="formSave" onclick="saveIntegration()">Save Credentials</button>
                    <button class="btn btn-secondary" id="formTest" onclick="testIntegration()">Test Pull</button>
                    <span id="formWired" style="font-size:.78rem;color:var(--success);margin-left:auto"></span>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

<script>
const API='/api';
let token=localStorage.getItem('adoptima_token')||'';
let currentUser=null, accounts=[], globalConfig={}, selectedAccount=null, activeIntegration=null;

function $(id){return document.getElementById(id)}
function toast(msg,type='success'){const d=document.createElement('div');d.className=`toast toast-${type}`;d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),3500)}

async function api(method,path,body){
    const opts={method,headers:{}};if(token)opts.headers['Authorization']='Bearer '+token;
    if(body){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body)}
    const res=await fetch(API+path,opts);
    if(res.status===401){window.location.href='/';throw new Error('Session expired')}
    if(!res.ok){const d=await res.json().catch(()=>({}));throw new Error(d.detail||'Request failed')}
    return res.status===204?null:res.json();
}

const integrations=[
    {id:'google-ads',name:'Google Ads',category:'Advertising',icon:'🔍',desc:'Import campaign performance, spend, and conversions.',color:'#e0e7ff',iconColor:'#4f46e5',wired:true,
     fields:[
        {id:'google_client_id',label:'Client ID',placeholder:'xxx.apps.googleusercontent.com',type:'text',global:false},
        {id:'google_client_secret',label:'Client Secret',placeholder:'Enter secret',type:'password',global:false},
        {id:'google_developer_token',label:'Developer Token',placeholder:'Google Ads developer token',type:'text',global:false},
        {id:'google_external_id',label:'Customer ID',placeholder:'123-456-7890',type:'text',global:false,account:true},
        {id:'google_refresh_token',label:'Refresh Token',placeholder:'OAuth refresh token',type:'password',global:true},
        {id:'google_is_live',label:'Live Mode',type:'checkbox',global:false,account:true}
     ]},
    {id:'meta-ads',name:'Meta Ads',category:'Advertising',icon:'📢',desc:'Pull Facebook/Instagram campaign spend and lead data.',color:'#ede9fe',iconColor:'#7c3aed',wired:true,
     fields:[
        {id:'meta_app_id',label:'App ID',placeholder:'Meta App ID',type:'text',global:false},
        {id:'meta_app_secret',label:'App Secret',placeholder:'Enter secret',type:'password',global:false},
        {id:'meta_access_token',label:'Access Token',placeholder:'Business manager access token',type:'password',global:true},
        {id:'meta_external_id',label:'Ad Account ID',placeholder:'act_123456789',type:'text',global:false,account:true},
        {id:'meta_is_live',label:'Live Mode',type:'checkbox',global:false,account:true}
     ]},
    {id:'leadsquared',name:'LeadSquared',category:'CRM',icon:'👥',desc:'Pull client leads directly into MIS reports.',color:'#dcfce7',iconColor:'#16a34a',wired:true,
     fields:[
        {id:'leadsquared_base_url',label:'Base URL',placeholder:'https://api.leadsquared.com',type:'text',global:true},
        {id:'leadsquared_access_key',label:'Access Key',placeholder:'LeadSquared access key',type:'text',global:true},
        {id:'leadsquared_secret_key',label:'Secret Key',placeholder:'Enter secret key',type:'password',global:true}
     ]},
    {id:'salesforce',name:'Salesforce',category:'CRM',icon:'☁️',desc:'Sync qualified leads, opportunities, and pipeline data.',color:'#dbeafe',iconColor:'#0369a1',wired:true,
     fields:[
        {id:'salesforce_url',label:'Salesforce URL',placeholder:'https://yourinstance.salesforce.com',type:'text',global:true},
        {id:'salesforce_client_id',label:'Client ID',placeholder:'Connected app client id',type:'text',global:true},
        {id:'salesforce_client_secret',label:'Client Secret',placeholder:'Enter secret',type:'password',global:true},
        {id:'salesforce_refresh_token',label:'Refresh Token',placeholder:'OAuth refresh token',type:'password',global:true}
     ]},
    {id:'whatsapp',name:'WhatsApp',category:'Communication',icon:'💬',desc:'Send automated daily MIS digests and payment reminders.',color:'#d1fae5',iconColor:'#059669',wired:false,
     fields:[
        {id:'whatsapp_api_key',label:'API Key / Token',placeholder:'WhatsApp Business API token',type:'password'},
        {id:'whatsapp_phone_id',label:'Phone Number ID',placeholder:'Phone number ID',type:'text'},
        {id:'whatsapp_template',label:'Default Template Name',placeholder:'hello_world',type:'text'}
     ]},
    {id:'slack',name:'Slack',category:'Communication',icon:'💬',desc:'Push daily MIS summaries and alerts to team channels.',color:'#f3e8ff',iconColor:'#9333ea',wired:false,
     fields:[
        {id:'slack_webhook_url',label:'Webhook URL',placeholder:'https://hooks.slack.com/services/...',type:'text'},
        {id:'slack_channel',label:'Channel',placeholder:'#mis-reports',type:'text'},
        {id:'slack_bot_token',label:'Bot Token',placeholder:'xoxb-...',type:'password'}
     ]},
    {id:'google-sheets',name:'Google Sheets',category:'Export',icon:'📊',desc:'Sync campaign and lead data to Google Sheets.',color:'#dcfce7',iconColor:'#16a34a',wired:false,
     fields:[
        {id:'gsheets_service_account',label:'Service Account JSON',placeholder:'Paste service account JSON',type:'textarea'},
        {id:'gsheets_spreadsheet_id',label:'Spreadsheet ID',placeholder:'1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgvE2upms',type:'text'}
     ]},
    {id:'google-drive',name:'Google Drive',category:'Export',icon:'📁',desc:'Save exported MIS reports and dashboards to Drive.',color:'#dbeafe',iconColor:'#2563eb',wired:false,
     fields:[
        {id:'gdrive_service_account',label:'Service Account JSON',placeholder:'Paste service account JSON',type:'textarea'},
        {id:'gdrive_folder_id',label:'Folder ID',placeholder:'Drive folder ID',type:'text'}
     ]},
    {id:'google-analytics',name:'Google Analytics',category:'Analytics',icon:'📈',desc:'Overlay website traffic and conversion data alongside spends.',color:'#fef3c7',iconColor:'#d97706',wired:false,
     fields:[
        {id:'ga_property_id',label:'Property ID',placeholder:'123456789',type:'text'},
        {id:'ga_service_account',label:'Service Account JSON',placeholder:'Paste service account JSON',type:'textarea'}
     ]},
    {id:'microsoft-excel',name:'Microsoft Excel',category:'Export',icon:'📗',desc:'Export MIS tables directly to formatted Excel workbooks.',color:'#d1fae5',iconColor:'#059669',wired:false,
     fields:[
        {id:'excel_client_id',label:'Microsoft Client ID',placeholder:'Azure app client ID',type:'text'},
        {id:'excel_client_secret',label:'Client Secret',placeholder:'Enter secret',type:'password'},
        {id:'excel_folder',label:'Default OneDrive Folder',placeholder:'/MIS Reports',type:'text'}
     ]},
    {id:'power-bi',name:'Power BI',category:'Analytics',icon:'📊',desc:'Stream MIS data to Power BI for advanced visualizations.',color:'#fef9c3',iconColor:'#ca8a04',wired:false,
     fields:[
        {id:'pbi_workspace_id',label:'Workspace ID',placeholder:'Guid',type:'text'},
        {id:'pbi_dataset_id',label:'Dataset ID',placeholder:'Guid',type:'text'},
        {id:'pbi_service_principal',label:'Service Principal JSON',placeholder:'Paste JSON',type:'textarea'}
     ]},
    {id:'supabase',name:'Supabase',category:'Database',icon:'🗄️',desc:'Sync parsed MIS data to Supabase for persistent cloud storage.',color:'#e0e7ff',iconColor:'#4f46e5',wired:false,
     fields:[
        {id:'supabase_url',label:'Project URL',placeholder:'https://xxx.supabase.co',type:'text'},
        {id:'supabase_anon_key',label:'Anon Key',placeholder:'eyJ...',type:'password'},
        {id:'supabase_service_role',label:'Service Role Key',placeholder:'eyJ...',type:'password'}
     ]},
    {id:'hubspot',name:'HubSpot',category:'CRM',icon:'🟠',desc:'Connect MIS lead data to HubSpot contacts and deal pipelines.',color:'#ffedd5',iconColor:'#ea580c',wired:false,
     fields:[
        {id:'hubspot_api_key',label:'Private App Access Token',placeholder:'pat-na1-...',type:'password'},
        {id:'hubspot_portal_id',label:'Portal ID',placeholder:'123456',type:'text'}
     ]}
];

function renderCards(){
    const sorted=[...integrations].sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    $('cardsGrid').innerHTML=sorted.map(i=>`
        <div class="int-card" onclick="openIntegration('${i.id}')">
            <div class="int-icon" style="background:${i.color};color:${i.iconColor}">${i.icon}</div>
            <div class="category">${i.category}</div>
            <h3>${i.name}</h3>
            <p>${i.desc}</p>
            <span class="status-pill ${getStatusClass(i)}" id="status-${i.id}">${getStatusText(i)}</span>
        </div>`).join('');
}

function getStatusClass(i){
    if(!i.wired)return 'status-offline';
    if(i.id==='google-ads')return (selectedAccount&&selectedAccount.google_is_live)?'status-connected':'status-offline';
    if(i.id==='meta-ads')return (selectedAccount&&selectedAccount.meta_is_live)?'status-connected':'status-offline';
    if(i.id==='leadsquared')return (globalConfig.leadsquared_access_key)?'status-pending':'status-offline';
    if(i.id==='salesforce')return (globalConfig.salesforce_url)?'status-pending':'status-offline';
    return 'status-offline';
}

function getStatusText(i){
    if(!i.wired)return '● Planned';
    if(i.id==='google-ads')return (selectedAccount&&selectedAccount.google_is_live)?'● Live':'● Not Connected';
    if(i.id==='meta-ads')return (selectedAccount&&selectedAccount.meta_is_live)?'● Live':'● Not Connected';
    if(i.id==='leadsquared')return (globalConfig.leadsquared_access_key)?'● Configured':'● Not set';
    if(i.id==='salesforce')return (globalConfig.salesforce_url)?'● Configured':'● Not set';
    return '● Not set';
}

function openIntegration(id){
    activeIntegration=integrations.find(x=>x.id===id);
    if(!activeIntegration)return;
    $('formTitle').textContent=activeIntegration.name;
    $('formDesc').textContent=activeIntegration.desc;
    $('formWired').textContent=activeIntegration.wired?'● Live backend connected':'● Planned integration (credentials saved, API coming soon)';
    $('formPanel').classList.remove('hidden');
    $('formFields').innerHTML=activeIntegration.fields.map(f=>{
        const val=getFieldValue(f);
        if(f.type==='textarea'){
            return `<div class="form-group full"><label>${f.label}</label><textarea id="int_${f.id}">${val}</textarea></div>`;
        }
        if(f.type==='checkbox'){
            return `<div class="form-group"><label style="display:flex;align-items:center;gap:.5rem;cursor:pointer"><input type="checkbox" id="int_${f.id}" ${val?'checked':''}> ${f.label}</label></div>`;
        }
        return `<div class="form-group"><label>${f.label}</label><input type="${f.type}" id="int_${f.id}" value="${val||''}" placeholder="${f.placeholder||''}"></div>`;
    }).join('');
    $('formPanel').scrollIntoView({behavior:'smooth'});
}

function getFieldValue(f){
    if(!selectedAccount && f.account)return '';
    if(f.account){
        if(f.id==='google_external_id')return selectedAccount.google_external_id||'';
        if(f.id==='google_is_live')return selectedAccount.google_is_live;
        if(f.id==='meta_external_id')return selectedAccount.meta_external_id||'';
        if(f.id==='meta_is_live')return selectedAccount.meta_is_live;
    }
    const key=f.id.replace(/^(google_|meta_)/,'');
    return selectedAccount? (selectedAccount[f.id]||globalConfig[f.id]||globalConfig[key]||''): (globalConfig[f.id]||globalConfig[key]||'');
}

function closeForm(){$('formPanel').classList.add('hidden');activeIntegration=null}

async function saveIntegration(){
    if(!activeIntegration)return;
    const accountPayload={};
    const globalPayload={};
    activeIntegration.fields.forEach(f=>{
        const el=$('int_'+f.id);
        const val=f.type==='checkbox'?el.checked:(el?el.value:'');
        if(f.account) accountPayload[f.id]=val;
        else if(f.global) globalPayload[f.id]=val;
        else{
            // per-account override by default
            accountPayload[f.id]=val;
            // also update global if no account selected, but account is required here
        }
    });
    try{
        if(selectedAccount && Object.keys(accountPayload).length){
            await api('PUT',`/accounts/${selectedAccount.id}`,accountPayload);
        }
        if(Object.keys(globalPayload).length){
            await api('POST','/config',globalPayload);
        }
        // refresh state
        accounts=await api('GET','/accounts');
        globalConfig=await api('GET','/config');
        selectedAccount=accounts.find(a=>a.id===selectedAccount.id)||null;
        onAccountChange();
        renderCards();
        toast(`${activeIntegration.name} credentials saved`);
    }catch(e){toast(e.message,'error')}
}

async function testIntegration(){
    if(!activeIntegration)return;
    if(!activeIntegration.wired){toast(`${activeIntegration.name} test pull not yet implemented`,'error');return}
    if(activeIntegration.id==='google-ads')toast('Google Ads test pull: uses live connector if credentials are valid','success');
    else if(activeIntegration.id==='meta-ads')toast('Meta Ads test pull: uses live connector if credentials are valid','success');
    else if(activeIntegration.id==='leadsquared')toast('LeadSquared test pull: uses live API if keys provided','success');
    else if(activeIntegration.id==='salesforce')toast('Salesforce test pull: uses live API if tokens provided','success');
}

async function init(){
    if(!token){window.location.href='/';return}
    try{currentUser=await api('GET','/auth/me')}catch(e){window.location.href='/';return}
    $('userInfo').textContent=currentUser.full_name||currentUser.email;
    accounts=await api('GET','/accounts');
    globalConfig=await api('GET','/config');
    accounts.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    $('accountSelect').innerHTML='<option value="">— Choose account —</option>'+accounts.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
    renderCards();
}

function onAccountChange(){
    const id=parseInt($('accountSelect').value);selectedAccount=accounts.find(a=>a.id===id)||null;
    if(selectedAccount){
        $('accountInfo').style.display='block';
        $('infoGoogle').textContent=(selectedAccount.google_external_id||'Not set')+(selectedAccount.google_is_live?' (Live)':'');
        $('infoMeta').textContent=(selectedAccount.meta_external_id||'Not set')+(selectedAccount.meta_is_live?' (Live)':'');
        $('infoBM').textContent=selectedAccount.business_manager_name||'—';
    }else{
        $('accountInfo').style.display='none';
    }
    renderCards();
    if(activeIntegration) openIntegration(activeIntegration.id);
}

window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
