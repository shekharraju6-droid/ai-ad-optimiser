                        ${allOpps.slice(0, 50).map(o => `<tr>
                            <td>${escapeHtml(o.created_at || '-')}</td>
                            <td><span class="badge badge-neutral">${escapeHtml(o.platform)}</span></td>
                            <td>${escapeHtml(o.name || '-')}</td>
                            <td class="text-right">${formatMoney(o.amount)}</td>
                            <td><span class="badge ${stageBadge(o.stage)}">${escapeHtml(o.stage || '-')}</span></td>
                            <td class="text-right">${formatPct(o.probability)}</td>
                            <td>${escapeHtml(o.close_date || '-')}</td>
                            <td>${escapeHtml(o.source || '-')}</td>
                        </tr>`).join('')}
                    </tbody>
                </table>
                </div>` : '<p style="color:var(--text-muted);">No opportunities found for this period.</p>'}
            </div>

            <div class="card">
                <div class="card-header"><div class="report-title">Manager Remarks</div></div>
                <div class="form-row">
                    <div class="form-group" style="flex:2;">
                        <label>Overall Notes</label>
                        <textarea id="misRemarks" rows="3" placeholder="Add overall remarks / action items for this MIS period..."></textarea>
                    </div>
                    <div class="form-group" style="flex:1; min-width:160px;">
                        <label>Status</label>
                        <select id="misStatus"><option value="On Track">On Track</option><option value="Needs Attention">Needs Attention</option><option value="At Risk">At Risk</option></select>
                    </div>
                </div>
                <div style="margin-top:0.75rem;">
                    <button class="btn btn-primary" onclick="saveRemarks()">Save Remarks</button>
                </div>
                <div id="savedRemarks" class="notes-box hidden" style="margin-top:0.75rem;"></div>
            </div>
        `;

        // Restore controls state
        $('misDatePreset').value = reportDateRange.preset;
        $('misStartDate').value = reportDateRange.start;
        $('misEndDate').value = reportDateRange.end;
        toggleCustomDateInputs(reportDateRange.preset === 'custom');
    }

    function statusBadge(status) {
        const s = (status || '').toLowerCase();
        if (['qualified', 'closed won'].includes(s)) return 'badge-success';
        if (['unqualified', 'closed lost'].includes(s)) return 'badge-danger';
        return 'badge-warning';
    }
    function stageBadge(stage) {
        const s = (stage || '').toLowerCase();
        if (s.includes('won')) return 'badge-success';
        if (s.includes('lost')) return 'badge-danger';
        return 'badge-warning';
    }

    function onPeriodChange(val) { /* Period aggregation handled on export; UI shows raw detail */ }
    function onDatePresetChange(val) {
        computeDateRange(val);
        $('misDatePreset').value = val;
        $('misStartDate').value = reportDateRange.start;
        $('misEndDate').value = reportDateRange.end;
        toggleCustomDateInputs(val === 'custom');
        if (val !== 'custom') reloadReport();
    }
    function onCustomDate() {
        reportDateRange = { preset: 'custom', start: $('misStartDate').value, end: $('misEndDate').value };
        $('misDatePreset').value = 'custom';
        reloadReport();
    }
    function toggleCustomDateInputs(show) {
        $('customStartWrap').classList.toggle('hidden', !show);
        $('customEndWrap').classList.toggle('hidden', !show);
    }
    async function reloadReport() {
        if (!selectedAccountId) return;
        const a = allAccounts.find(x => x.id === selectedAccountId);
        if (!a) return;
        $('reportContent').innerHTML = '<div class="loading-wrap"><div class="spinner"></div> Loading report...</div>';
        await renderReport(a);
    }

    async function saveRemarks() {
        const btn = (typeof event !== 'undefined' && event) ? event.target : null;
        _setSaving(btn);
        try {
            const remarks = $('misRemarks').value.trim();
            const status = $('misStatus').value;
            if (!remarks) { toast('Enter remarks before saving', true); return; }
            const box = $('savedRemarks');
            box.classList.remove('hidden');
            const ts = new Date().toLocaleString('en-IN');
            box.innerHTML = `<strong>${status}</strong> — ${escapeHtml(remarks)}<br><span style="font-size:0.75rem; color:var(--text-light);">Saved ${ts}</span>`;
            toast('Remarks saved');
        } finally { _resetSaving(btn); }
    }

    function exportExcel() {
        toast('Excel export: building file from current tables...');
        const rows = [['Source', 'Leads', 'Opportunities', 'Pipeline Value', 'Won Value', 'Est. Spend', 'Notes']];
        const table = $('sourceTable');
        if (table) {
            table.querySelectorAll('tbody tr').forEach(tr => {
                const cells = tr.querySelectorAll('td');
                const noteInput = cells[6]?.querySelector('input');
                rows.push([
                    cells[0]?.innerText || '',
                    cells[1]?.innerText || '',
                    cells[2]?.innerText || '',
                    cells[3]?.innerText || '',
                    cells[4]?.innerText || '',
                    cells[5]?.innerText || '',
                    noteInput ? noteInput.value : ''
                ]);
            });
        }
        let csv = rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'mis_report.csv';
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
    }

    function exportPDF() {
        toast('PDF export: use browser print → Save as PDF for best formatting');
        window.print();
    }

    // ---------- Mantri Developers report ----------
    async function renderMantriReport() {
        $('reportTitle').textContent = 'Mantri Developers - Lead Status by Platform';
        $('welcomeState').classList.add('hidden');
        $('reportContent').classList.remove('hidden');
        $('reportContent').innerHTML = `
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; flex-wrap:wrap; gap:0.75rem;">
                <div style="font-size:1rem; font-weight:700;">Lead Status by Platform</div>
                <div style="display:flex; align-items:center; gap:0.75rem;">
                    <span id="mantriModeBadge" class="mantri-status sample"><span class="mantri-status-dot"></span>Sample data</span>
                    <button class="btn btn-success" onclick="exportMantriExcel()">⬇ Export Excel</button>
                </div>
            </div>
            <div class="card" style="margin-bottom:0;">
                <div style="font-size:0.78rem; color:var(--text-muted); margin-bottom:0.75rem;" id="mantriReportMeta"></div>
                <div style="overflow-x:auto;">
                    <table class="dsu-table" id="mantriTable"><thead><tr></tr></thead><tbody></tbody></table>
                </div>
                <div id="mantriEmpty" class="empty-state hidden">No data available.</div>
            </div>`;
        const table = $('mantriTable');
        const tbody = table.querySelector('tbody');
        const thead = table.querySelector('thead');
        tbody.innerHTML = '<tr><td colspan="99" style="text-align:center;padding:2rem;color:var(--text-light);">Loading...</td></tr>';
        $('mantriEmpty').classList.add('hidden');
        try {
            const data = await api('GET', '/mantri/reports/lead-status-by-platform');
            const modeText = data.configured ? 'Live data mode' : 'Sample data mode';
            $('mantriReportMeta').textContent = 'Generated: ' + (data.generated_at || 'today') + ' | ' + modeText;
            const badge = $('mantriModeBadge');
            if (data.configured) { badge.className = 'mantri-status live'; badge.innerHTML = '<span class="mantri-status-dot"></span>Live data'; }
            else { badge.className = 'mantri-status sample'; badge.innerHTML = '<span class="mantri-status-dot"></span>Sample data'; }

            if (!data.rows || !data.rows.length) {
                tbody.innerHTML = ''; thead.innerHTML = '';
                $('mantriEmpty').classList.remove('hidden');
                return;
            }

            const border = '1px solid var(--color-border-strong)';
            const redFill = 'var(--color-danger-text)';
            const lightRedFill = 'var(--color-danger)';
            const whiteText = 'color:var(--color-text-on-accent);';
            const cellPad = 'padding:0.15rem 0.25rem;';
            const fontSize = 'font-size:0.72rem;';
            const center = 'text-align:center;';
            const thStyle = `background:${redFill}; ${whiteText} border:${border}; ${center} font-weight:700; ${cellPad} ${fontSize}; white-space:nowrap;`;
            const subThStyle = `background:${lightRedFill}; ${whiteText} border:${border}; ${center} font-weight:700; ${cellPad} ${fontSize}; white-space:nowrap;`;

            thead.innerHTML = `
                <tr style="background:${redFill}; ${whiteText} ${fontSize}">
                    <th style="${thStyle}">MANTRI</th>
                    <th colspan="2" style="${thStyle}">Meta</th>
                    <th colspan="2" style="${thStyle}">Google</th>
                    <th colspan="2" style="${thStyle}">Overall</th>
                </tr>
                <tr style="background:${lightRedFill}; ${whiteText} ${fontSize}">
                    <th style="${subThStyle} text-align:left;">Lead Status</th>
                    <th style="${subThStyle}">Count</th>
                    <th style="${subThStyle}">Percentage</th>
                    <th style="${subThStyle}">Count</th>
                    <th style="${subThStyle}">Percentage</th>
                    <th style="${subThStyle}">Count</th>
                    <th style="${subThStyle}">Percentage</th>
                </tr>`;

            tbody.innerHTML = '';
            const isTotal = (label) => label && String(label).toLowerCase().includes('grand total');
            data.rows.forEach((row, idx) => {
                const tr = document.createElement('tr');
                const totalRow = isTotal(row.lead_status);
                if (totalRow) {
                    tr.style.background = redFill;
                } else if (idx % 2 === 1) {
                    tr.style.background = 'var(--color-bg-card-hover)';
                }
                const textStyle = totalRow ? whiteText + ' font-weight:700;' : 'color:var(--color-text-primary);';
                const fmtPct = (val) => (val === '' || val === null || val === undefined) ? '' : Number(val).toFixed(1) + '%';
                tr.innerHTML = `
                    <td style="border:${border}; ${cellPad} ${fontSize} ${textStyle} font-weight:${totalRow ? '700' : '600'}; white-space:nowrap;">${escapeHtml(row.lead_status)}</td>
                    <td style="border:${border}; ${cellPad} ${fontSize} ${textStyle} ${center} white-space:nowrap;">${Number(row.meta_count || 0).toLocaleString('en-IN')}</td>
                    <td style="border:${border}; ${cellPad} ${fontSize} ${textStyle} ${center} white-space:nowrap;">${fmtPct(row.meta_pct)}</td>
                    <td style="border:${border}; ${cellPad} ${fontSize} ${textStyle} ${center} white-space:nowrap;">${Number(row.google_count || 0).toLocaleString('en-IN')}</td>
                    <td style="border:${border}; ${cellPad} ${fontSize} ${textStyle} ${center} white-space:nowrap;">${fmtPct(row.google_pct)}</td>
                    <td style="border:${border}; ${cellPad} ${fontSize} ${textStyle} ${center} white-space:nowrap;">${Number(row.overall_count || 0).toLocaleString('en-IN')}</td>
                    <td style="border:${border}; ${cellPad} ${fontSize} ${textStyle} ${center} white-space:nowrap;">${fmtPct(row.overall_pct)}</td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="99" style="text-align:center;padding:2rem;color:var(--color-danger);">Error: ' + escapeHtml(e.message) + '</td></tr>';
            toast(e.message, true);
        }
    }

    function exportMantriExcel() {
        const url = API + '/mantri/reports/export-excel';
        const a = document.createElement('a');
        a.href = url + (token ? '?token=' + encodeURIComponent(token) : '');
        a.download = '';
        document.body.appendChild(a); a.click(); a.remove();
        toast('Excel export started');
    }

    function escapeHtml(str) {
        if (str === undefined || str === null) return '';
        return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    }

    window.addEventListener('DOMContentLoaded', () => {
        computeDateRange('last30');
        loadAccounts();
        if (token) {
            api('GET', '/auth/me').then(u => {
                if (u && (u.role === 'admin' || u.role === 'superadmin')) {
                    const ahBtn = document.getElementById('misActivityHistoryBtn');
                    if (ahBtn) ahBtn.classList.remove('hidden');
                }
            }).catch(() => {});
        }
    });

    // Swallow browser-extension message-channel errors that leak into our page
    window.addEventListener('unhandledrejection', (e) => {
        const msg = (e.reason && e.reason.message) || String(e.reason);
        if (msg && (msg.includes('message channel closed') || msg.includes('asynchronous response'))) {
            e.preventDefault();
        }
    });
    window.addEventListener('error', (e) => {
        const msg = e.message || '';
        if (msg.includes('message channel closed') || msg.includes('asynchronous response')) {
            e.preventDefault();
        }
    });
    </script>

    <!-- Voice Assistant Widget -->
    <div id="voice-assistant-widget">
        <div id="voice-status-text">Listening...</div>
        <button id="voice-mic-btn">🎤</button>
    </div>

    <script>
    (function() {
        const micBtn = document.getElementById('voice-mic-btn');
        const statusText = document.getElementById('voice-status-text');
        if (!micBtn) return;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        function ensureRecognition() {
            if (!recognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = 'en-IN';
                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    console.log('[Rudra] transcript:', transcript);
                    sendTextCommand(transcript);
                };
                recognition.onerror = (event) => {
                    console.error('[Rudra] speech recognition error:', event.error);
                    if (event.error !== 'aborted' && event.error !== 'no-speech') {
                        toast('Rudra could not hear you. Please allow microphone and try again.', true);
                    }
                    statusText.style.display = 'none';
                    micBtn.style.backgroundColor = 'var(--color-accent)';
                };
                recognition.onend = () => {
                    statusText.style.display = 'none';
                    micBtn.style.backgroundColor = 'var(--color-accent)';
                };
            }
        }

        async function sendTextCommand(text) {
            statusText.innerText = "Processing command...";
            try {
                const response = await fetch('/api/voice/command', {
                    method: 'POST',
                    body: JSON.stringify({ text }),
                    headers: {
                        'Authorization': 'Bearer ' + (localStorage.getItem('adoptima_token') || ''),
                        'Content-Type': 'application/json'
                    }
                });
                console.log('[Rudra] backend response status:', response.status);
                if (!response.ok) {
                    let errMsg = 'Rudra could not process the command (server error ' + response.status + ')';
                    try { const errData = await response.json(); errMsg = errData.detail || errMsg; } catch (e) {}
                    console.error('[Rudra] error detail:', errMsg);
                    toast(errMsg, true);
                    return;
                }
                const result = await response.json();
                console.log('[Rudra] parsed action:', JSON.stringify(result));
                if (!result || !result.action) {
                    toast('Rudra did not return an action. Try rephrasing.', true);
                    return;
                }
                handleVoiceAction(result);
            } catch (err) {
                console.error('[Rudra] voice routing failure:', err);
                toast("Voice command failed: " + (err.message || 'network error'), true);
            } finally {
                statusText.style.display = 'none';
                micBtn.style.backgroundColor = 'var(--color-accent)';
            }
        }

        micBtn.addEventListener('click', async () => {
            ensureRecognition();
            try {
                statusText.style.display = 'block';
                statusText.innerText = "Listening... (speak, then pause)";
                micBtn.style.backgroundColor = 'var(--color-danger)';
                recognition.start();
            } catch (err) {
                console.error('[Rudra] failed to start recognition:', err);
                toast("Microphone access denied or not supported", true);
                statusText.style.display = 'none';
                micBtn.style.backgroundColor = 'var(--color-accent)';
            }
        });

        function handleVoiceAction(data) {
            if (!data || !data.action) return;
            console.log("Voice action:", data);
            const params = data.parameters || {};
            switch (data.action) {
                case 'REFRESH_METRICS':
                    if (currentAccountId && typeof loadReport === "function") loadReport(currentAccountId);
                    else window.location.reload();
                    break;
                case 'SWITCH_TAB':
                case 'NAVIGATE':
                    const tabId = params.tab_id || params.module_name || data.target_module;
                    const report = params.report || 'dsu';
                    if (tabId === 'revenueops') window.location.href = '/revenueops';
                    else if (tabId === 'adpulse') window.location.href = '/adpulse';
                    else if (tabId === 'mis' || tabId === 'insightdesk') {
                        if (currentAccountId && typeof loadReport === "function") loadReport(currentAccountId, report);
                    }
                    else if (tabId === 'home' || tabId === 'landing') window.location.href = '/';
                    else if (currentAccountId && typeof loadReport === "function") loadReport(currentAccountId, report);
                    else toast('Rudra did not understand where to navigate. Try again.', true);
                    break;
                case 'OPEN_MODAL':
                    if (params.modal_type === 'date') {
                        const fromInput = $('dateFrom');
                        if (fromInput) fromInput.focus();
                    }
                    break;
                case 'SYNC_LEADS':
                    if (typeof syncLeadsNow === "function") syncLeadsNow();
                    else {
                        const btn = $('syncLeadsBtn');
                        if (btn && !btn.disabled) btn.click();
                        else toast('Select a Client/Brand first to sync leads', true);
                    }
                    break;
                case 'TOGGLE_LIVE_MODE':
                    window.location.href = '/adpulse';
                    break;
                case 'CREATE_INVOICE':
                    window.location.href = '/revenueops';
                    break;
                case 'SHOW_OVERDUE':
                    window.location.href = '/revenueops';
                    break;
            }
        }
    })();
    </script>
