<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChlearSakhaaOps AI - InsightDesk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        (function() {
            try { if (localStorage.getItem('adoptima_theme') === 'dark') document.documentElement.classList.add('dark-mode'); } catch (e) {}
        })();
    </script>
    <style>
        :root {
            --color-bg-page: #ffffff;
            --color-bg-sidebar: #fafaf9;
            --color-bg-card: #fafaf9;
            --color-bg-card-hover: #f5f5f4;
            --color-bg-input: #ffffff;
            --color-bg-modal: #ffffff;
            --color-bg-tooltip: #1c1917;
            --color-border: #e7e5e4;
            --color-border-strong: #d6d3d1;
            --color-border-input: #d6d3d1;
            --color-border-focus: #d97706;
            --color-text-primary: #1c1917;
            --color-text-secondary: #57534e;
            --color-text-muted: #a8a29e;
            --color-text-on-accent: #ffffff;
            --color-text-on-tooltip: #fafaf9;
            --color-accent: #d97706;
            --color-accent-hover: #b45309;
            --color-accent-light: #fef3c7;
            --color-accent-text: #92400e;
            --color-success: #059669;
            --color-success-light: #d1fae5;
            --color-success-text: #065f46;
            --color-danger: #dc2626;
            --color-danger-light: #fee2e2;
            --color-danger-text: #991b1b;
            --color-warning: #d97706;
            --color-warning-light: #fef3c7;
            --color-warning-text: #92400e;
            --color-info: #2563eb;
            --color-info-light: #dbeafe;
            --color-info-text: #1e40af;
            --color-purple: #7c3aed;
            --color-purple-light: #ede9fe;
            --color-purple-text: #5b21b6;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --overlay-bg: rgba(0,0,0,0.4);
        }
        html.dark-mode {
            --color-bg-page: #1c1917;
            --color-bg-sidebar: #151310;
            --color-bg-card: #292524;
            --color-bg-card-hover: #33302e;
            --color-bg-input: #292524;
            --color-bg-modal: #292524;
            --color-bg-tooltip: #fafaf9;
            --color-border: #3d3937;
            --color-border-strong: #57534e;
            --color-border-input: #57534e;
            --color-border-focus: #f59e0b;
            --color-text-primary: #fafaf9;
            --color-text-secondary: #d6d3d1;
            --color-text-muted: #78716c;
            --color-text-on-accent: #ffffff;
            --color-text-on-tooltip: #1c1917;
            --color-accent: #f59e0b;
            --color-accent-hover: #d97706;
            --color-accent-light: rgba(245,158,11,0.12);
            --color-accent-text: #fbbf24;
            --color-success: #34d399;
            --color-success-light: rgba(52,211,153,0.12);
            --color-success-text: #6ee7b7;
            --color-danger: #f87171;
            --color-danger-light: rgba(248,113,113,0.12);
            --color-danger-text: #fca5a5;
            --color-warning: #fbbf24;
            --color-warning-light: rgba(251,191,36,0.12);
            --color-warning-text: #fde68a;
            --color-info: #60a5fa;
            --color-info-light: rgba(96,165,250,0.12);
            --color-info-text: #93bbfd;
            --color-purple: #a78bfa;
            --color-purple-light: rgba(167,139,250,0.12);
            --color-purple-text: #c4b5fd;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
            --overlay-bg: rgba(0,0,0,0.6);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--color-bg-page); color: var(--color-text-primary); height: 100vh; overflow: hidden; display: flex; font-size: 14px; line-height: 1.6; transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease; }
        h1,h2,h3,h4,.font-outfit { font-family: 'DM Sans', -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--color-border-strong); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--color-text-muted); }

        .app-layout { display: flex; width: 100vw; height: 100vh; }
        .sidebar { width: 220px; background: var(--color-bg-sidebar); border-right: 1px solid var(--color-border); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--color-border); }
        .app-logo { font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; color: var(--color-text-primary); }
        .logo-icon { width: 24px; height: 24px; background: var(--color-accent); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: var(--color-text-on-accent); font-weight: 700; font-size: 10px; }
        .sidebar-section-title { font-family: 'Inter', sans-serif; font-size: 10px; text-transform: uppercase; font-weight: 600; color: var(--color-text-muted); letter-spacing: 0.06em; padding: 16px 16px 6px; }
        .account-list { flex-grow: 1; overflow-y: auto; }
        .account-item { display: flex; align-items: center; gap: 8px; padding: 10px 16px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--color-text-secondary); transition: all 0.1s ease; border-left: 3px solid transparent; border-bottom: 1px solid var(--color-border); }
        .account-item:hover { background: var(--color-bg-card-hover); }
        .account-item.active { background: var(--color-bg-card-hover); color: var(--color-text-primary); border-left: 3px solid var(--color-accent); }
        .account-item.no-crm { color: var(--color-text-muted); opacity: 0.6; cursor: default; }
        .account-icon { width: 28px; height: 28px; border-radius: var(--radius-sm); background: var(--color-accent-light); color: var(--color-accent-text); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
        .home-btn { display: flex; align-items: center; gap: 8px; padding: 10px 16px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; color: var(--color-text-secondary); transition: all 0.1s ease; text-decoration: none; }
        .home-btn:hover { background: var(--color-bg-card-hover); }

        .main { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; background: var(--color-bg-page); }
        .topbar { height: 52px; background: var(--color-bg-page); border-bottom: 1px solid var(--color-border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        .topbar h1 { font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 600; color: var(--color-text-primary); }
        .theme-toggle { width: 32px; height: 32px; background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--color-text-secondary); transition: background 0.15s ease; }
        .theme-toggle:hover { background: var(--color-bg-card-hover); }
        .btn { padding: 6px 14px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 6px; transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease; text-decoration: none; font-family: 'Inter', sans-serif; }
        .btn-primary { background: var(--color-accent); color: var(--color-text-on-accent); border: none; }
        .btn-primary:hover { background: var(--color-accent-hover); }
        .btn-secondary { background: transparent; border: 1px solid var(--color-border); color: var(--color-text-secondary); }
        .btn-secondary:hover { background: var(--color-bg-card-hover); }
        .btn-success { background: var(--color-success); color: var(--color-text-on-accent); border: none; }
        .btn-success:hover { filter: brightness(1.1); }

        .content { flex-grow: 1; overflow-y: auto; padding: 20px 24px; }
        .card { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
        .card-title { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; color: var(--color-text-primary); }
        .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--color-text-muted); font-size: 13px; }

        .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
        .form-group { display: flex; flex-direction: column; gap: 4px; min-width: 160px; flex: 1; }
        .form-group label { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; color: var(--color-text-secondary); }
        .form-group input, .form-group select, .form-group textarea { padding: 8px 12px; border: 1px solid var(--color-border-input); border-radius: var(--radius-md); font-size: 13px; font-family: 'Inter', sans-serif; background: var(--color-bg-input); color: var(--color-text-primary); transition: border-color 0.15s ease; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--color-border-focus); box-shadow: 0 0 0 3px rgba(217,119,6,0.1); }
        .form-group textarea { resize: vertical; }
        .date-input { min-width: 130px; cursor: pointer; }
        input[type="date"].date-input { position: relative; z-index: 1; background: var(--color-bg-input); }

        /* DSU Report tables - using variable-based colors */
        .dsu-table { width: 100%; border-collapse: collapse; font-size: 12px; background: var(--color-bg-card); border: 1px solid var(--color-border-strong); border-radius: var(--radius-md); overflow: hidden; }
        .dsu-table th { padding: 8px 12px; border: 1px solid var(--color-border); text-align: left; background: var(--color-accent-light); color: var(--color-accent-text); font-family: 'Inter', sans-serif; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
        .dsu-table td { padding: 8px 12px; border: 1px solid var(--color-border); background: var(--color-bg-card); text-align: left; color: var(--color-text-primary); font-variant-numeric: tabular-nums; }
        .dsu-table td[style*="font-weight:500"], .dsu-table td[style*="font-weight: 500"] { font-variant-numeric: normal; }
        .dsu-table tbody tr:nth-child(even) td { background: var(--color-bg-card-hover); }
        .dsu-table tbody tr:hover td { background: var(--color-bg-card-hover); }
        .dsu-table .text-right { text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }
        .dsu-table .text-center { text-align: center; }
        .dsu-banner { text-align: center; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.02em; padding: 12px 16px; background: var(--color-accent-light) !important; color: var(--color-accent-text) !important; border: 1px solid var(--color-accent) !important; }
        .dsu-mode-row { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 16px; flex-wrap: wrap; text-align: center; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; padding: 8px; color: var(--color-text-primary); background: var(--color-bg-card) !important; }
        .dsu-mode-row label { display: inline-flex; align-items: center; gap: 4px; margin: 0; cursor: pointer; font-weight: 500; color: var(--color-text-primary); }
        .dsu-mode-row input[type="radio"] { width: 16px; height: 16px; accent-color: var(--color-accent); }
        .dsu-mode-row select { padding: 6px 10px; border: 1px solid var(--color-border-input); border-radius: var(--radius-sm); font-size: 12px; font-family: 'Inter', sans-serif; background: var(--color-bg-input); color: var(--color-text-primary); }
        .dsu-mode-row select:focus { outline: none; border-color: var(--color-border-focus); }
        .dsu-mode-row input[type="date"] { padding: 4px 8px; border: 1px solid var(--color-border-input); border-radius: var(--radius-sm); font-size: 12px; font-family: 'Inter', sans-serif; background: var(--color-bg-input); color: var(--color-text-primary); }
        .dsu-mis-row { text-align: center; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 8px; color: var(--color-accent); background: var(--color-bg-card) !important; }
        .dsu-range-label { margin-left: 1rem; color: var(--color-accent); font-weight: 600; font-family: 'DM Sans', sans-serif; font-size: 13px; }
        .dsu-total-row td { background: var(--color-accent-light) !important; border: 1px solid var(--color-border-strong) !important; font-weight: 600; color: var(--color-text-primary); }
        .dsu-grand-row td { background: var(--color-warning-light) !important; border: 1px solid var(--color-warning) !important; font-weight: 600; color: var(--color-text-primary); }
        .dsu-section-row td { background: var(--color-bg-card-hover) !important; border: 1px solid var(--color-border-strong) !important; font-weight: 600; color: var(--color-text-primary); text-align: center; letter-spacing: 0.03em; font-size: 12px; }
        .dsu-table4-wrap { max-width: 720px; margin: 0 auto; }
        .dsi-table4-wrap { max-width: 720px; margin: 0 auto; }

        /* Report title, labels, containers */
        .report-title { font-family: 'DM Sans', sans-serif; font-size: 20px; font-weight: 700; color: var(--color-text-primary); padding-bottom: 10px; border-bottom: 3px solid var(--color-accent); margin-bottom: 16px; display: inline-block; }
        .report-notice { background: var(--color-accent-light); border: 1px solid var(--color-accent); border-radius: var(--radius-md); padding: 12px 16px; font-size: 12px; font-weight: 500; color: var(--color-accent-text); letter-spacing: 0.02em; margin-bottom: 12px; }
        .table-label { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; color: var(--color-text-primary); background: var(--color-bg-card-hover); padding: 8px 14px; border-radius: var(--radius-sm); display: inline-block; margin-bottom: 8px; }
        .report-container { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-sm); }

        /* DSI Table 1 & 2 compact layout */
        .dsi-t1t2-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        @media (max-width: 1100px) { .dsi-t1t2-wrap { grid-template-columns: 1fr; } }
        .dsi-t1t2-wrap .dsu-table { font-size: 11px; }
        .dsi-t1t2-wrap .dsu-table th { padding: 4px 6px; font-size: 10px; }
        .dsi-t1t2-wrap .dsu-table td { padding: 4px 6px; }
        .dsi-t1t2-wrap .dsu-banner { padding: 6px 10px; font-size: 10px; letter-spacing: 0.02em; }
        .dsi-t1t2-wrap .dsu-mis-row { padding: 4px; font-size: 11px; }
        .dsi-t1t2-wrap .dsu-total-row td { padding: 4px 6px; }

        .dsu-table7 { width: 100%; border-collapse: collapse; font-size: 12px; background: var(--color-bg-card); border: 1px solid var(--color-border-strong); border-radius: var(--radius-md); overflow: hidden; }
        .dsu-table7 th { padding: 8px 12px; border: 1px solid var(--color-border); text-align: left; background: var(--color-accent-light); color: var(--color-accent-text); font-family: 'Inter', sans-serif; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
        .dsu-table7 td { padding: 8px 12px; border: 1px solid var(--color-border); background: var(--color-bg-card); text-align: left; color: var(--color-text-primary); font-variant-numeric: tabular-nums; }
        .dsu-table7 tbody tr:nth-child(even) td { background: var(--color-bg-card-hover); }
        .dsu-table7 tbody tr:hover td { background: var(--color-bg-card-hover); }
        .dsu-table7 .text-right { text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }
        .dsu-table7 .text-center { text-align: center; }
        .dsu-table7 .balance-positive { color: var(--color-success-text); font-weight: 600; }
        .dsu-table7 .balance-negative { color: var(--color-danger-text); font-weight: 600; }
        .dsu-table7-grand td { background: var(--color-info-light) !important; color: var(--color-info-text) !important; border: 1px solid var(--color-info) !important; font-weight: 600; }

        /* =========================================================
           RESPONSIVE REPORT LAYOUT — screenshot & zoom ready
           ========================================================= */
        /* Prevent horizontal overflow at app level */
        html, body { overflow-x: hidden; }
        .main, .content { overflow-x: hidden; min-width: 0; }

        /* Main content area must subtract the fixed sidebar width */
        .main {
            width: calc(100vw - 220px);
            max-width: calc(100vw - 220px);
            box-sizing: border-box;
        }
        @media (max-width: 768px) {
            .main {
                width: calc(100vw - 180px);
                max-width: calc(100vw - 180px);
            }
        }

        /* Report content fills the available main area */
        #reportContent {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
            box-sizing: border-box;
        }
        #reportContent > .card {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
            padding: clamp(8px, 1vw, 20px);
            box-sizing: border-box;
        }

        /* Header / topbar responsiveness */
        .topbar {
            flex-wrap: wrap;
            gap: 8px;
            height: auto;
            min-height: 52px;
            padding: 8px 16px;
        }
        .topbar h1, #reportTitle {
            font-size: clamp(16px, 2vw, 22px) !important;
            white-space: normal;
            word-break: break-word;
        }
        .topbar > div:last-child {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: flex-end;
        }
        .topbar .btn {
            flex: 0 1 auto;
            white-space: nowrap;
            font-size: clamp(11px, 1vw, 13px);
            padding: clamp(4px, 0.6vw, 8px) clamp(8px, 1.2vw, 14px);
        }

        /* Tab bars */
        .report-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 0.75rem;
        }
        .report-tabs .btn {
            font-size: clamp(11px, 1vw, 13px);
            padding: clamp(4px, 0.5vw, 8px) clamp(8px, 1vw, 16px);
            flex: 0 1 auto;
            white-space: nowrap;
        }

        /* Date / mode selectors — spans and date inputs */
        .dsu-mode-row span,
        .dsu-mode-row label span {
            font-size: clamp(11px, 1vw, 13px);
        }
        .dsu-range-label {
            font-size: clamp(12px, 1.2vw, 15px);
        }
        .dsu-mis-row {
            font-size: clamp(10px, 0.9vw, 12px);
        }

        /* Side-by-side report tables wrapper (DSU T1/T2 and DSI T1/T2) */
        .report-tables-flex {
            display: flex;
            gap: 12px;
            align-items: stretch;
            width: 100%;
            max-width: 100%;
            overflow: hidden;
            box-sizing: border-box;
        }
        .report-tables-flex > .report-container,
        .report-tables-flex > div {
            flex: 1;
            min-width: 0;
            width: 0;
            max-width: 50%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
        }
        @media (max-width: 900px) {
            .report-tables-flex {
                flex-direction: column;
            }
            .report-tables-flex > .report-container,
            .report-tables-flex > div {
                max-width: 100%;
                width: auto;
            }
        }

        /* Report container styling for clean screenshot separation */
        .report-container {
            width: 100%;
            max-width: 100%;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            background: var(--color-bg-card);
            overflow: hidden;
        }

        /* Generic table responsiveness */
        .dsu-table, .dsu-table7 {
            width: 100% !important;
            max-width: 100%;
            table-layout: fixed;
            word-wrap: break-word;
            font-size: clamp(11px, 1.1vw, 14px);
        }
        .dsu-table th, .dsu-table7 th {
            font-size: clamp(10px, 1vw, 13px);
            padding: clamp(4px, 0.5vw, 8px) clamp(6px, 0.8vw, 12px);
            word-break: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
        }
        .dsu-table td, .dsu-table7 td {
            font-size: clamp(11px, 1.1vw, 14px);
            padding: clamp(4px, 0.5vw, 8px) clamp(6px, 0.8vw, 12px);
            word-break: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            vertical-align: top;
        }

        /* Numeric columns */
        .dsu-table .text-right,
        .dsu-table7 .text-right,
        .dsu-table td.text-right,
        .dsu-table7 td.text-right {
            text-align: right !important;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        /* Text columns */
        .dsu-table td:not(.text-right):not(.text-center),
        .dsu-table7 td:not(.text-right):not(.text-center),
        .dsu-table th:not(.text-right):not(.text-center),
        .dsu-table7 th:not(.text-right):not(.text-center) {
            text-align: left;
            white-space: normal;
        }

        /* Section / banner rows */
        .dsu-section-row td,
        .dsu-banner,
        .report-notice {
            width: 100%;
            max-width: 100%;
            font-size: clamp(10px, 0.9vw, 12px);
            padding: clamp(6px, 0.8vw, 12px);
            white-space: normal;
            word-break: break-word;
            overflow-wrap: break-word;
            box-sizing: border-box;
        }
        .report-notice {
            width: 100%;
            max-width: 100%;
        }

        /* Section header labels */
        .table-label {
            font-size: clamp(10px, 0.9vw, 12px);
            padding: clamp(6px, 0.7vw, 10px) clamp(8px, 1vw, 14px);
        }

        /* Report titles */
        .report-title {
            font-size: clamp(14px, 1.6vw, 20px) !important;
            white-space: normal;
            word-break: break-word;
        }

        /* Sticky total row */
        .dsu-total-row,
        .dsu-grand-row,
        .dsu-table7-grand {
            position: sticky;
            bottom: 0;
            z-index: 2;
        }
        .dsu-total-row td {
            background: var(--color-accent-light) !important;
            border: 1px solid var(--color-border-strong) !important;
            font-weight: 600;
        }

        /* Centered table wrappers for Table 4 / Table 5 should not overflow */
        .dsu-table4-wrap, .dsi-table4-wrap {
            max-width: 100%;
            width: 100%;
            margin: 0 auto;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        /* Report date inputs/selectors must not force table width */
        .dsu-mode-row select,
        .dsu-mode-row input[type="date"],
        .report-container select,
        .report-container input[type="date"] {
            min-width: 0;
            max-width: 100%;
        }

        /* Info notice boxes */
        .report-notice,
        .dsu-banner {
            box-sizing: border-box;
        }

        /* Print-friendly output */
        @media print {
            @page { margin: 10mm; size: landscape; }
            .sidebar, .topbar .theme-toggle, #syncLeadsBtn,
            .topbar a.btn, #misActivityHistoryBtn,
            .topbar button:not(#reportTitle) { display: none !important; }
            .topbar { border: none; justify-content: center; }
            .topbar h1 { font-size: 16px; color: #000; }
            body { background: #fff; color: #000; overflow: visible; }
            .main, .content { overflow: visible; background: #fff; }
            #reportContent, .card, .report-container {
                background: #fff !important;
                box-shadow: none !important;
                border-color: #ccc !important;
                color: #000 !important;
                overflow: visible !important;
            }
            .dsu-table, .dsu-table7 {
                border-color: #ccc !important;
                font-size: 10px !important;
            }
            .dsu-table th, .dsu-table7 th,
            .dsu-table td, .dsu-table7 td {
                border-color: #ccc !important;
                color: #000 !important;
                background: #fff !important;
            }
            .dsu-table tbody tr:nth-child(even) td,
            .dsu-table7 tbody tr:nth-child(even) td { background: #f9f9f9 !important; }
            .dsu-total-row td, .dsu-grand-row td, .dsu-table7-grand td {
                background: #fff3cd !important;

            .report-title { color: #000 !important; border-color: #999 !important; }
            .report-tabs, .dsu-mode-row, .report-notice { page-break-inside: avoid; }
            /* Force side-by-side tables on landscape print */
            .report-tables-flex {
                flex-direction: row !important;
            }
            .report-tables-flex > .report-container,
            .report-tables-flex > div {

        .dsu-budget-form { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 16px; margin-bottom: 16px; }
        .dsu-budget-form-title { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--color-text-primary); }
        .dsu-budget-form .form-group { min-width: 130px; }
        .dsu-budget-form input, .dsu-budget-form select { padding: 8px 10px; font-size: 13px; }
        .action-btn { background: none; border: none; cursor: pointer; padding: 3px 5px; font-size: 16px; color: var(--color-text-muted); }
        .action-btn:hover { opacity: 0.7; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--color-border); }
        th { background: var(--color-bg-card-hover); font-weight: 600; color: var(--color-text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
        td { color: var(--color-text-primary); }
        tr:hover td { background: var(--color-bg-card-hover); }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 500; }
        .badge-google { background: var(--color-info-light); color: var(--color-info-text); }
        .badge-meta { background: var(--color-purple-light); color: var(--color-purple-text); }
        .badge-crm { background: var(--color-warning-light); color: var(--color-warning-text); }
        .badge-success { background: var(--color-success-light); color: var(--color-success-text); }
        .badge-warning { background: var(--color-warning-light); color: var(--color-warning-text); }
        .badge-danger { background: var(--color-danger-light); color: var(--color-danger-text); }
        .badge-neutral { background: var(--color-bg-card-hover); color: var(--color-text-muted); }

        .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
        .metric-box { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 16px; }
        .metric-box .label { font-family: 'Inter', sans-serif; font-size: 10px; color: var(--color-text-muted); margin-bottom: 6px; text-transform: uppercase; font-weight: 600; }
        .metric-box .value { font-family: 'DM Sans', sans-serif; font-size: 20px; font-weight: 700; color: var(--color-text-primary); }
        .metric-box .sub { font-size: 11px; color: var(--color-text-muted); margin-top: 4px; }

        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; background: var(--color-bg-card-hover); color: var(--color-text-muted); border: 1px solid var(--color-border); }
        .status-badge.live { background: var(--color-success-light); color: var(--color-success-text); border-color: var(--color-success); }
        .status-badge.offline { background: var(--color-bg-card-hover); color: var(--color-text-muted); border-color: var(--color-border); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

        .spinner { border: 3px solid var(--color-border); border-top-color: var(--color-accent); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-wrap { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 48px; color: var(--color-text-muted); }

        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--color-bg-tooltip); color: var(--color-text-on-tooltip); padding: 12px 16px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; box-shadow: var(--shadow-md); z-index: 1000; opacity: 0; transform: translateY(10px); transition: 0.3s; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: var(--color-danger); color: var(--color-text-on-accent); }
        .hidden { display: none !important; }

        #voice-assistant-widget { position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; align-items: center; gap: 10px; }
        #voice-status-text { background: var(--color-bg-tooltip); color: var(--color-text-on-tooltip); padding: 6px 12px; border-radius: 20px; font-size: 12px; display: none; font-family: 'Inter', sans-serif; }
        #voice-mic-btn { width: 56px; height: 56px; border-radius: 50%; background: var(--color-accent); border: none; color: var(--color-text-on-accent); cursor: pointer; box-shadow: var(--shadow-md); font-size: 22px; transition: all 0.2s ease; }
        #voice-mic-btn:hover { transform: scale(1.05); background: var(--color-accent-hover); }
        #voice-mic-btn:active { transform: scale(0.95); }

        /* Mantri lead status table */
        .mantri-status { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
        .mantri-status.live { background: var(--color-success-light); color: var(--color-success-text); }
        .mantri-status.sample { background: var(--color-warning-light); color: var(--color-warning-text); }
        .mantri-status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { width: 180px; }
            .content { padding: 12px; }
        }

</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="app-logo"><div class="logo-icon">ID</div>InsightDesk</div>
            </div>
            <div class="home-btn" id="homeBtn" onclick="goHome()" style="border-bottom:1px solid var(--color-border);padding:10px 16px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px; height:15px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Home
            </div>
            <div style="padding:0;">
                <a class="home-btn" href="/" style="text-decoration:none; display:flex; padding:10px 16px;">🏠 ChlearSakhaaOps Home</a>
            </div>
            <div class="sidebar-section-title">Client/Brand</div>
            <div id="accountList" class="account-list"></div>
        </aside>

        <main class="main">
            <div class="topbar">
                <h1 id="reportTitle">MIS Reports</h1>
                <div style="display:flex;gap:8px;align-items:center;">
                    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode"></button>
                    <button id="syncLeadsBtn" class="btn btn-primary" onclick="syncLeadsNow()" disabled title="Sync LeadSquared leads for the selected Client/Brand" style="display:none;">
                        ↻ Sync Leads Now
                    </button>
                    <a href="/" class="btn btn-secondary">Back to Dashboard</a>
                    <button class="btn btn-secondary hidden" id="misActivityHistoryBtn" onclick="window.location.href='/adpulse?open_activity_history=1'">Activity History</button>
                </div>
            </div>
            <div class="content">
                <div id="reportContainer" class="card">
                    <div class="empty-state" id="welcomeState">
                        <div style="text-align:center;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:64px; height:64px; color:var(--color-text-muted); margin-bottom:16px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                            <div style="font-family:'DM Sans',sans-serif; font-size:18px; font-weight:600; color:var(--color-text-primary);">Select a Client/Brand</div>
                            <div style="font-size:13px; color:var(--color-text-muted); margin-top:8px;">Choose from the left panel to view reports.</div>
                        </div>
                    </div>
                    <div id="reportContent" class="hidden"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
    const API = '/api';
    let token = localStorage.getItem('adoptima_token') || '';
    let allAccounts = [];
    let selectedAccountId = null;
    let reportDateRange = { preset: 'last30', start: '', end: '' };

    function $(id) { return document.getElementById(id); }
    function toggleTheme(){var isDark=document.documentElement.classList.toggle('dark-mode');try{localStorage.setItem('adoptima_theme',isDark?'dark':'light')}catch(e){}updateThemeIcon()}
    function updateThemeIcon(){var btn=$('themeToggle');if(!btn)return;btn.textContent=document.documentElement.classList.contains('dark-mode')?'☀':'☾'}
    updateThemeIcon();

    function _setSaving(btn, text) {
        if (!btn) return;
        if (!btn.dataset.originalText) btn.dataset.originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = text || 'Saving...';
    }
    function _resetSaving(btn) {
        if (!btn) return;
        btn.disabled = false;
        if (btn.dataset.originalText) {
            btn.textContent = btn.dataset.originalText;
            delete btn.dataset.originalText;
        }
    }

    async function api(method, path, body) {
        const opts = { method, headers: {} };
        if (token) opts.headers['Authorization'] = 'Bearer ' + token;
        if (body) {
            opts.headers['Content-Type'] = 'application/json';
            opts.body = JSON.stringify(body);
        }
        const res = await fetch(API + path, opts);
        if (res.status === 401) {
            localStorage.removeItem('adoptima_token');
            window.location.href = '/';
            throw new Error('Session expired.');
        }
        if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.detail || `Request failed (${res.status})`);
        }
        return res.status === 204 ? null : res.json();
    }

    function toast(msg, error) {
        let t = $('toast');
        if (!t) {
            t = document.createElement('div'); t.id = 'toast'; document.body.appendChild(t);
        }
        t.className = 'toast' + (error ? ' error' : '');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function today() {
        const d = new Date();
        return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    }
    function fmtDate(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }
    function formatMoney(n) {
        if (n === undefined || n === null) return 'Rs 0';
        return 'Rs ' + Number(n).toLocaleString('en-IN', { maximumFractionDigits: 0 });
    }
    function formatNum(n) { return Number(n || 0).toLocaleString('en-IN'); }
    function formatPct(n) { return Number(n || 0).toFixed(2) + '%'; }

    function computeDateRange(preset) {
        const end = today();
        let start = new Date(end);
        switch (preset) {
            case 'today': break;
            case 'yesterday': start.setDate(end.getDate() - 1); end.setDate(end.getDate() - 1); break;
            case 'last7': start.setDate(end.getDate() - 6); break;
            case 'last15': start.setDate(end.getDate() - 14); break;
            case 'last30': start.setDate(end.getDate() - 29); break;
            case 'thisMonth': start.setDate(1); break;
            case 'lastMonth': start.setMonth(end.getMonth() - 1, 1); end.setMonth(end.getMonth(), 0); break;
            case 'allTime': start = new Date('2020-01-01'); break;
            case 'custom': return;
        }
        reportDateRange = { preset, start: fmtDate(start), end: fmtDate(end) };
    }

    function getReportParams() {
        const r = reportDateRange;
        const params = [];
        if (r.start) params.push('start_date=' + encodeURIComponent(r.start));
        if (r.end) params.push('end_date=' + encodeURIComponent(r.end));
        return params.length ? '?' + params.join('&') : '';
    }

    async function loadAccounts() {
        try {
            allAccounts = await api('GET', '/accounts');
            renderAccountList();
        } catch (e) { toast(e.message, true); }
    }

    function renderAccountList() {
        const container = $('accountList');
        container.innerHTML = '';
        if (!allAccounts.length) {
            container.innerHTML = '<div style="padding:1rem 1.25rem; color:var(--text-muted); font-size:0.85rem;">No Client/Brand found.</div>';
            return;
        }
        const sortedAccounts = [...allAccounts].sort((a, b) => (a.name || '').localeCompare(b.name || ''));
        sortedAccounts.forEach(a => {
            const el = document.createElement('div');
            el.className = 'account-item';
            el.onclick = () => selectAccount(a.id);
            el.innerHTML = `
                <div class="account-icon">${getInitials(a.name)}</div>
                <div>${escapeHtml(a.name)}</div>
            `;
            container.appendChild(el);
        });
    }

    function getInitials(name) {
        return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function goHome() {
        selectedAccountId = null;
        $('homeBtn').classList.add('active');
        document.querySelectorAll('.account-item').forEach(el => el.classList.remove('active'));
        $('reportTitle').textContent = 'MIS Reports';
        $('welcomeState').classList.remove('hidden');
        $('reportContent').classList.add('hidden');
        $('reportContent').innerHTML = '';
        $('syncLeadsBtn').style.display = 'none';
    }

    let _syncing = false;
    async function syncLeadsNow() {
        if (!selectedAccountId || _syncing) return;
        const btn = $('syncLeadsBtn');
        _syncing = true;
        btn.disabled = true;
        btn.textContent = '↻ Syncing...';
        try {
            const result = await api('POST', '/reports/lsq-sync?account_id=' + selectedAccountId);
            toast('Synced ' + (result.synced_count || 0) + ' leads from LeadSquared');
            await new Promise(r => setTimeout(r, 500));
            const a = allAccounts.find(x => x.id === selectedAccountId);
            if (a && a.name === 'DSU') { await loadDSUReport(); }
            else if (a && a.name === 'DSI') { await loadDSIReport(); }
        } catch (e) {
            toast('Sync failed: ' + e.message, true);
        } finally {
            _syncing = false;
            btn.disabled = false;
            btn.textContent = '↻ Sync Leads Now';
        }
    }

    async function selectAccount(id) {
        selectedAccountId = id;
        $('homeBtn').classList.remove('active');
        document.querySelectorAll('.account-item').forEach(el => el.classList.remove('active'));
        const items = $('accountList').children;
        const idx = allAccounts.findIndex(a => a.id === id);
        if (items[idx]) items[idx].classList.add('active');
        const a = allAccounts.find(x => x.id === id);
        $('reportTitle').textContent = 'MIS Report - ' + (a ? a.name : '');
        $('welcomeState').classList.add('hidden');
        $('reportContent').classList.remove('hidden');
        $('reportContent').innerHTML = '<div class="loading-wrap"><div class="spinner"></div> Loading report...</div>';
        const syncBtn = $('syncLeadsBtn');
        const isLsqAccount = a && (a.name === 'DSU' || a.name === 'DSI');
        if (isLsqAccount) {
            syncBtn.style.display = '';
            syncBtn.disabled = false;
            syncBtn.textContent = '↻ Sync Leads Now';
        } else {
            syncBtn.style.display = 'none';
        }
        if (a && a.name === 'DSU') {
            await renderDSUReport();
            return;
        }
        if (a && a.name === 'DSI') {
            await renderDSIReport();
            return;
        }
        if (a && a.name === 'Mantri Developers') {
            renderMantriReport();
            return;
        }
        computeDateRange(reportDateRange.preset || 'last30');
        await renderReport(a);
    }

    let dsuT1Range = { preset: 'yesterday', start: '', end: '' };
    let dsuT2Range = { preset: 'inception', start: '', end: '' };

    function computeDSUDateRange(preset, rangeObj) {
        // Table 2 is historical / previous-day performance, so all presets end on yesterday.
        const end = today();
        end.setDate(end.getDate() - 1);
        let start = new Date(end);
        switch (preset) {
            case 'yesterday': break;
            case 'today': start = today(); break;
            case 'last7': start.setDate(end.getDate() - 6); break;
            case 'last15': start.setDate(end.getDate() - 14); break;
            case 'last30': start.setDate(end.getDate() - 29); break;
            case 'thisMonth': start.setDate(1); break;
            case 'inception': start = new Date('2025-11-28'); break;
            case 'custom': return;
        }
        rangeObj.preset = preset;
        rangeObj.start = fmtDate(start);
        rangeObj.end = fmtDate(end);
    }

    // --- Table 1 date helpers ---
    const getYesterdayInputDate = () => {
        const d = new Date();
        d.setDate(d.getDate() - 1);
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };
    const getTodayInputDate = () => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };
    const parseDateToComparable = (val) => {
        if (!val) return null;
        if (val instanceof Date) return new Date(val.getFullYear(), val.getMonth(), val.getDate());
        const s = String(val).trim();
        if (!s) return null;
        const dmyMatch = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
        if (dmyMatch) {
            return new Date(parseInt(dmyMatch[3], 10), parseInt(dmyMatch[2], 10) - 1, parseInt(dmyMatch[1], 10));
        }
        const parsed = new Date(s);
        if (!isNaN(parsed.getTime())) return new Date(parsed.getFullYear(), parsed.getMonth(), parsed.getDate());
        return null;
    };
    const isSameDay = (d1, d2) => {
        if (!d1 || !d2) return false;
        return d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth() && d1.getDate() === d2.getDate();
    };
    const formatHeaderDate = (date) => {
        if (!date) return '';
        const d = date instanceof Date ? date : parseDateToComparable(date);
        if (!d) return '';
        const day = d.getDate();
        const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
        let suffix = 'th';
        if ([1,21,31].includes(day)) suffix = 'st';
        else if ([2,22].includes(day)) suffix = 'nd';
        else if ([3,23].includes(day)) suffix = 'rd';
        return `${day}${suffix} ${months[d.getMonth()]} ${d.getFullYear()}`;
    };
    const fmtDDMMMYYYY = (dateStr) => {
        if (!dateStr) return '';
        const d = new Date(dateStr + 'T00:00:00');
        if (isNaN(d.getTime())) return '';
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${String(d.getDate()).padStart(2,'0')}-${months[d.getMonth()]}-${d.getFullYear()}`;
    };
    const t1RangeLabel = (rangeObj) => {
        if (rangeObj.preset === 'today') return `Today: ${formatHeaderDate(rangeObj.start)}`;
        if (rangeObj.preset === 'yesterday') return formatHeaderDate(rangeObj.start);
        if (rangeObj.preset === 'custom' && rangeObj.start && rangeObj.end) {
            return `${formatHeaderDate(rangeObj.start)} - ${formatHeaderDate(rangeObj.end)}`;
        }
        return '';
    };

    async function renderDSUReport() {
        if (!dsuT1Range.start) computeDSUDateRange('yesterday', dsuT1Range);
        if (!dsuT2Range.start) computeDSUDateRange('inception', dsuT2Range);
        await loadDSUReport();
    }

    let dsuActiveTab = 't1t2';

    async function loadDSUReport() {
        try {
            const tab = dsuActiveTab || 't1t2';
            if (tab === 't1t2') {
                const params = `?t1_start=${dsuT1Range.start}&t1_end=${dsuT1Range.end}&t2_start=${dsuT2Range.start}&t2_end=${dsuT2Range.end}`;
                const data = await api('GET', '/reports/dsu-performance' + params);
                buildDSUReport(data);
            } else if (tab === 't3') {
                const params = `?start_date=${dsuT1Range.start}&end_date=${dsuT1Range.end}`;
                const data = await api('GET', '/reports/dsu/lead-pivot' + params);
                buildDSUTable3(data);
            } else if (tab === 't4') {
                const data = await api('GET', '/reports/dsu/application-mis');
                buildDSUTable4(data);
            } else if (tab === 't5') {
                const data = await api('GET', '/reports/dsu/budget-mis');
                buildDSUTable5(data);
            } else if (tab === 't6') {
                const params = `?start_date=${dsuT1Range.start}&end_date=${dsuT1Range.end}`;
                const data = await api('GET', '/reports/dsu/lead-stages' + params);
                buildDSUTable6(data);
            } else if (tab === 't7') {
                const data = await api('GET', '/reports/dsu/monthly-summary');
                buildDSUTable7(data);
            }
        } catch (e) {
            toast(e.message, true);
            $('reportContent').innerHTML = '<div class="empty-state">Failed to load DSU report: ' + escapeHtml(e.message) + '</div>';
        }
    }

    function dsuTabBar() {
        const tabs = [
            { id: 't1t2', label: 'Table 1 & 2: Course Performance' },
            { id: 't3', label: 'Table 3: Lead Pivot' },
            { id: 't4', label: 'Table 4: Application MIS' },

            { id: 't6', label: 'Table 6: Lead Stages' },
            { id: 't7', label: 'Table 7: Monthly Summary' },

        return `<div class="report-tabs">

    // ========================================================================
    // DSU Table 3: Lead Attribution Pivot
    // ========================================================================
    function buildDSUTable3(data) {
        const stages = data.stages || [];
        const rows = data.rows || [];
        const colTotals = data.column_totals || {};
        const grandTotal = data.grand_total || 0;

        const headerCells = stages.map(s => `<th class="text-right">${escapeHtml(s)}</th>`).join('');
        const totalCells = stages.map(s => `<td class="text-right">${colTotals[s] || 0}</td>`).join('');

        const bodyRows = rows.map(r => {
            const cells = stages.map(s => {
                const v = r[s] || 0;
                return `<td class="text-right">${v === 0 ? '' : v}</td>`;
            }).join('');
            const rowSum = stages.reduce((sum, s) => sum + (r[s] || 0), 0);
            return `<tr><td style="font-weight:500">${escapeHtml(r.source)}</td>${cells}<td class="text-right" style="font-weight:600">${rowSum === 0 ? '' : rowSum}</td></tr>`;
        }).join('');

        $('reportContent').innerHTML = `
            ${dsuTabBar()}
            <div class="card">
                <div class="card-header">
                    <div class="report-title">Table 3: Lead Attribution Pivot (Student Source × Student Stage)</div>
                </div>
                <div style="overflow-x:auto;">
                <table class="dsu-table">
                    <thead>
                        <tr><th>Source</th>${headerCells}<th class="text-right">Total</th></tr>
                    </thead>
                    <tbody>
                        ${bodyRows}
                        <tr class="dsu-total-row"><td>TOTAL</td>${totalCells}<td class="text-right">${grandTotal}</td></tr>
                    </tbody>
                </table>
                </div>
            </div>
        `;
    }

    // ========================================================================

        const gt = data.grand_total;
        const gtCpa = gt.submitted > 0 ? fmtMoney(gt.cpa) : '0';
        const gtSubmitted = gt.submitted > 0 ? fmtNum(gt.submitted) : '0';

        $('reportContent').innerHTML = `

                </table>
                </div>
            </div>

    // ========================================================================
    // DSU Table 7: Monthly Spend Summary and Balance
    // ========================================================================
    let dsuEditingBudgetId = null;
    let dsiEditingBudgetId = null;

    function buildDSUTable7(data) {
        const fmtMoney = (n) => '₹' + Number(n || 0).toLocaleString('en-IN', { maximumFractionDigits: 0 });
        const rows = data.rows || [];
        const gt = data.grand_total || {};

        const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        const fmtDate = (dateStr) => {
            if (!dateStr) return '-';
            try {
                const d = new Date(dateStr + 'T00:00:00');
                if (isNaN(d.getTime())) return dateStr;
                return `${String(d.getDate()).padStart(2,'0')}-${monthNames[d.getMonth()]}-${d.getFullYear()}`;
            } catch(e) { return dateStr; }
        };

        const balanceClass = (n) => (n || 0) < 0 ? 'balance-negative' : 'balance-positive';

        const body = rows.map(r => {
            const monthlyCells = r.is_first_in_month
                ? `
                    <td class="text-right ${balanceClass(r.available_balance)}" ${r.month_rowspan > 1 ? `rowspan="${r.month_rowspan}"` : ''} style="vertical-align:middle;background:var(--color-bg-card)">
                        ${fmtMoney(r.received_monthly)}
                    </td>

    // ========================================================================
    // DSI REPORT RENDERING
    // ========================================================================

    let dsiT1Range = { preset: 'yesterday', start: '', end: '' };
    let dsiT2Range = { preset: 'inception', start: '', end: '' };
    let dsiActiveTab = 't1t2';

    function computeDSIDateRange(preset, rangeObj) {
        const end = today();
        end.setDate(end.getDate() - 1);
        let start = new Date(end);
        switch (preset) {
            case 'yesterday': break;
            case 'today': start = today(); break;
            case 'last7': start.setDate(end.getDate() - 6); break;
            case 'last15': start.setDate(end.getDate() - 14); break;
            case 'last30': start.setDate(end.getDate() - 29); break;
            case 'thisMonth': start.setDate(1); break;
            case 'inception': start = new Date('2025-11-28'); break;
            case 'custom': return;
        }
        rangeObj.preset = preset;
        rangeObj.start = fmtDate(start);
        rangeObj.end = fmtDate(end);
    }

    async function renderDSIReport() {
        if (!dsiT1Range.start) computeDSIDateRange('yesterday', dsiT1Range);
        if (!dsiT2Range.start) computeDSIDateRange('inception', dsiT2Range);
        await loadDSIReport();
    }

    async function loadDSIReport() {
        try {
            const tab = dsiActiveTab || 't1t2';
            if (tab === 't1t2') {
                const params = `?t1_start=${dsiT1Range.start}&t1_end=${dsiT1Range.end}&t2_start=${dsiT2Range.start}&t2_end=${dsiT2Range.end}`;
                const data = await api('GET', '/reports/dsi-performance' + params);
                buildDSIReport(data);
            } else if (tab === 't3') {
                const params = `?start_date=${dsiT1Range.start}&end_date=${dsiT1Range.end}`;
                const data = await api('GET', '/reports/dsi/lead-pivot' + params);
                buildDSITable3(data);
            } else if (tab === 't4') {
                const data = await api('GET', '/reports/dsi/application-mis');
                buildDSITable4(data);
            } else if (tab === 't5') {
                const [budgetData, entries] = await Promise.all([
                    api('GET', '/reports/dsi/budget-mis'),
                    api('GET', '/reports/dsi/budget-entries'),
                ]);
                buildDSITable5(budgetData, entries);
            }
        } catch (e) {
            toast(e.message, true);
            $('reportContent').innerHTML = '<div class="empty-state">Failed to load DSI report: ' + escapeHtml(e.message) + '</div>';
        }
    }

    function dsiTabBar() {
        const tabs = [
            { id: 't1t2', label: 'Table 1 & 2: Course Performance' },

            { id: 't5', label: 'Table 5: Budget MIS' },

        </div>`;
    }

        dsiActiveTab = tabId;
        $('reportContent').innerHTML = '<div class="loading-wrap"><div class="spinner"></div> Loading...</div>';
        loadDSIReport();

    function buildDSIReport(data) {
        const fmtMoney = (n) => '₹' + Number(n || 0).toLocaleString('en-IN', { maximumFractionDigits: 0 });
        const fmtNum = (n) => Number(n || 0).toLocaleString('en-IN');

        // Format a YYYY-MM-DD date as "22nd June"
        const fmtDayMonth = (dateStr) => {
            if (!dateStr) return '';
            const d = new Date(dateStr + 'T00:00:00');
            if (isNaN(d)) return '';
            const day = d.getDate();
            const suffix = (n) => {
                if (n > 3 && n < 21) return 'th';
                switch (n % 10) {
                    case 1: return 'st';
                    case 2: return 'nd';
                    case 3: return 'rd';
                    default: return 'th';
                }
            };
            const month = d.toLocaleString('en-GB', { month: 'long' });
            return `${day}${suffix(day)} ${month}`;
        };

        const renderDSITable = (title, rows, total, headerRows) => {
            // Group by department for rowspan: blank department cells merge visually
            const deptRuns = [];
            for (let i = 0; i < rows.length; i++) {
                if (i === 0 || rows[i].department !== rows[i - 1].department) {
                    deptRuns.push({ start: i, count: 1, dept: rows[i].department });
                } else {
                    deptRuns[deptRuns.length - 1].count++;
                }
            }
            const deptRowSpan = {};
            deptRuns.forEach(run => { deptRowSpan[run.start] = run.count; });

            // For DSCASC - UG, merge CPL and Spend cells at department level
            const cplSpendRowSpan = {};
            for (let i = 0; i < rows.length; i++) {
                if (rows[i].department === 'DSCASC - UG') {
                    if (i === 0 || rows[i - 1].department !== 'DSCASC - UG') {
                        let count = 1;
                        while (i + count < rows.length && rows[i + count].department === 'DSCASC - UG') count++;
                        cplSpendRowSpan[i] = count;
                    }
                }
            }

            const body = rows.map((r, i) => {
                const deptCell = deptRowSpan[i]
                    ? `<td style="font-weight:700;vertical-align:middle;text-align:center" rowspan="${deptRowSpan[i]}">${escapeHtml(r.department || '')}</td>`
                    : '';

                let cplCell, spendCell;
                if (r.department === 'DSCASC - UG') {
                    if (cplSpendRowSpan[i]) {
                        const deptCpl = r.dept_leads ? fmtMoney(r.dept_cpl) : 'No Leads';
                        cplCell = `<td class="text-right" style="vertical-align:middle" rowspan="${cplSpendRowSpan[i]}">${deptCpl}</td>`;
                        spendCell = `<td class="text-right" style="vertical-align:middle" rowspan="${cplSpendRowSpan[i]}">${fmtMoney(r.dept_spend)}</td>`;
                    } else {
                        cplCell = '';
                        spendCell = '';
                    }
                } else {
                    const cpl = r.leads ? fmtMoney(r.cpl) : 'No Leads';
                    cplCell = `<td class="text-right">${cpl}</td>`;
                    spendCell = `<td class="text-right">${fmtMoney(r.spend)}</td>`;
                }

                return `<tr>${deptCell}<td style="font-weight:500">${escapeHtml(r.course)}</td><td class="text-right">${fmtNum(r.leads)}</td>${cplCell}${spendCell}</tr>`;
            }).join('');
            const totalCpl = total.leads ? fmtMoney(total.cpl) : 'No Leads';
            return `
                <div class="report-container" style="margin-bottom:12px">
                    <table class="dsu-table">
                        <thead>${headerRows}
                            <tr><th>Department</th><th>Course</th><th class="text-right">Lead</th><th class="text-right">CPL</th><th class="text-right">Spend</th></tr>
                        </thead>
                        <tbody>${body}
                            <tr class="dsu-total-row"><td colspan="2">TOTAL</td><td class="text-right">${fmtNum(total.leads)}</td><td class="text-right">${totalCpl}</td><td class="text-right">${fmtMoney(total.spend)}</td></tr>
                        </tbody>
                    </table>
                </div>
            `;
        };

        const d = data.daily;
        const c = data.cumulative;

        const dsiT1DateSelector = () => {
            const label = t1RangeLabel(dsiT1Range);
            const custom = dsiT1Range.preset === 'custom';
            return `
                <div style="display:flex;align-items:center;justify-content:center;gap:0.75rem;flex-wrap:wrap;margin-bottom:0.5rem;">
                    <span>Table 1:</span>
                    <label class="dsu-mode-row" style="margin:0 0.35rem">
                        <input type="radio" name="dsiT1Mode" value="yesterday" ${dsiT1Range.preset==='yesterday'?'checked':''} onchange="dsiT1Preset('yesterday')">
                        <span>Yesterday</span>
                    </label>
                    <label class="dsu-mode-row" style="margin:0 0.35rem">
                        <input type="radio" name="dsiT1Mode" value="today" ${dsiT1Range.preset==='today'?'checked':''} onchange="dsiT1Preset('today')">
                        <span>Today</span>
                    </label>
                    <label class="dsu-mode-row" style="margin:0 0.35rem">
                        <input type="radio" name="dsiT1Mode" value="custom" ${custom?'checked':''} onchange="dsiT1Preset('custom')">
                        <span>Custom</span>
                    </label>
                    ${custom?`
                        <div style="display:flex;align-items:center;gap:0.35rem;flex-wrap:wrap;">
                            <input type="date" id="dsiT1Start" value="${dsiT1Range.start}" onchange="dsiT1Custom()" class="date-input" style="padding:4px 8px;border:1px solid var(--color-border-input);border-radius:var(--radius-sm);font-size:12px;background:var(--color-bg-input);color:var(--color-text-primary);">
                            <span style="font-size:0.7rem">to</span>
                            <input type="date" id="dsiT1End" value="${dsiT1Range.end}" onchange="dsiT1Custom()" class="date-input" style="padding:4px 8px;border:1px solid var(--color-border-input);border-radius:var(--radius-sm);font-size:12px;background:var(--color-bg-input);color:var(--color-text-primary);">
                        </div>
                    `:''}
                    <span class="dsu-range-label">${label}</span>
                </div>
            `;
        };

        const t1Header = `
            <tr><th colspan="5" class="dsu-banner">${data.gst_note || 'MIXED GST: BASE TILL 18-JUN-2026 · 18% GST FROM 19-JUN-2026'}</th></tr>
            <tr><th colspan="5" class="dsu-mis-row">MIS - ${dsiT1Range.preset === 'custom' ? `${fmtDayMonth(dsiT1Range.start)} to ${fmtDayMonth(dsiT1Range.end)}` : fmtDayMonth(dsiT1Range.end)}</th></tr>

        const t2Header = `
            <tr><th colspan="5" class="dsu-banner">MIXED GST: BASE TILL 18-JUN-2026 · 18% GST FROM 19-JUN-2026</th></tr>
            <tr><th colspan="5" class="dsu-mis-row">MIS - ${fmtDayMonth(dsiT2Range.start)} to ${fmtDayMonth(dsiT2Range.end)}</th></tr>
        `;

        $('reportContent').innerHTML = `
            ${dsiTabBar()}
            ${dsiT1DateSelector()}
            <div class="report-tables-flex">
                <div class="report-container" style="padding:0;box-shadow:none">
                    ${renderDSITable(d.title, d.rows, d.total, t1Header)}
                </div>
                <div class="report-container" style="padding:0;box-shadow:none">
                    ${renderDSITable(c.title, c.rows, c.total, t2Header)}
                </div>
            </div>
        `;
    }

    function buildDSITable3(data) {
        const stages = data.stages || [];
        const rows = data.rows || [];
        const colTotals = data.column_totals || {};
        const grandTotal = data.grand_total || 0;

        const headerCells = stages.map(s => `<th class="text-right">${escapeHtml(s)}</th>`).join('');

            const cells = stages.map(s => {

            const rowSum = stages.reduce((sum, s) => sum + (r[s] || 0), 0);
            return `<tr><td style="font-weight:500">${escapeHtml(r.course)}</td>${cells}<td class="text-right" style="font-weight:600">${rowSum === 0 ? '' : rowSum}</td></tr>`;

    function buildDSITable5(data, entries = []) {
        const fmtMoney = (n) => '₹' + Number(n || 0).toLocaleString('en-IN', { maximumFractionDigits: 0 });
        const fmtNum = (n) => Number(n || 0).toLocaleString('en-IN');
        const fmtDate = (dateStr) => {
            if (!dateStr) return '-';
            const d = new Date(dateStr + 'T00:00:00');
            if (isNaN(d.getTime())) return dateStr;
            const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            return `${String(d.getDate()).padStart(2,'0')}-${m[d.getMonth()]}-${d.getFullYear()}`;
        };

        const rows = data.rows || [];
        const gt = data.grand_total || {};

        // Department rowspan for merged Department column
        const deptRuns = [];
        for (let i = 0; i < rows.length; i++) {
            if (i === 0 || rows[i].department !== rows[i - 1].department) {
                deptRuns.push({ start: i, count: 1, dept: rows[i].department });
            } else {
                deptRuns[deptRuns.length - 1].count++;
            }
        }
        const deptRowSpan = {};
        deptRuns.forEach(run => { deptRowSpan[run.start] = run.count; });

        // For DSCASC - UG, merge Budget / Spend / Remaining cells at department level
        const budgetMergeRowSpan = {};
        for (let i = 0; i < rows.length; i++) {
            if (rows[i].department === 'DSCASC - UG') {
                if (i === 0 || rows[i - 1].department !== 'DSCASC - UG') {
                    let count = 1;
                    while (i + count < rows.length && rows[i + count].department === 'DSCASC - UG') count++;
                    budgetMergeRowSpan[i] = count;
                }
            }
        }

        const body = rows.map((r, i) => {
            const statusColor = r.status === 'Live' ? 'color:var(--color-success-text);font-weight:600' : 'color:var(--color-text-muted);font-weight:600';
            const deptCell = deptRowSpan[i]
                ? `<td style="font-weight:700;vertical-align:middle;text-align:center;padding:0.35rem 0.5rem" rowspan="${deptRowSpan[i]}">${escapeHtml(r.department || '')}</td>`
                : '';

            let budgetCell, spendCell, remainingCell;
            if (r.department === 'DSCASC - UG') {
                if (budgetMergeRowSpan[i]) {
                    budgetCell = `<td class="text-right" style="padding:0.35rem 0.5rem;vertical-align:middle" rowspan="${budgetMergeRowSpan[i]}">${fmtMoney(r.dept_budget)}</td>`;
                    spendCell = `<td class="text-right" style="padding:0.35rem 0.5rem;vertical-align:middle" rowspan="${budgetMergeRowSpan[i]}">${fmtMoney(r.dept_spend)}</td>`;
                    remainingCell = `<td class="text-right" style="padding:0.35rem 0.5rem;vertical-align:middle" rowspan="${budgetMergeRowSpan[i]}">${fmtMoney(r.dept_remaining)}</td>`;

                spendCell = `<td class="text-right" style="padding:0.35rem 0.5rem">${fmtMoney(r.spend)}</td>`;

            return `<tr>${deptCell}<td style="font-weight:500;padding:0.35rem 0.5rem">${escapeHtml(r.course)}</td><td class="text-center" style="padding:0.35rem 0.5rem;${statusColor}">${escapeHtml(r.status)}</td>${budgetCell}${spendCell}${remainingCell}</tr>`;

        // Budget entries table
        const formTitle = dsiEditingBudgetId ? 'Edit Budget Received' : 'Add Budget Received';
        const saveFn = dsiEditingBudgetId ? 'dsiUpdateBudgetEntry()' : 'dsiSaveBudgetEntry()';

                                <option value="DSCASC - UG" ${editingEntry && editingEntry.section === 'DSCASC - UG' ? 'selected' : ''}>DSCASC - UG</option>
                                <option value="DSCASC - Masters" ${editingEntry && editingEntry.section === 'DSCASC - Masters' ? 'selected' : ''}>DSCASC - Masters</option>
                            </select>
                        </div>
                        <div class="form-group dsu-budget-form" style="flex:0;min-width:auto;display:flex;gap:0.5rem;">
                            <button class="btn btn-primary" onclick="${saveFn}">${dsiEditingBudgetId ? 'Update' : 'Save'}</button>
                            ${dsiEditingBudgetId ? `<button class="btn btn-secondary" onclick="dsiCancelBudgetEdit()">Cancel</button>` : ''}
                        </div>
                    </div>
                </div>

                <!-- Budget Summary Table -->
                <div class="dsi-table4-wrap" style="margin-bottom:0.75rem">
                <table class="dsu-table" style="font-size:0.78rem">
                    <thead><tr><th style="padding:0.35rem 0.5rem">Department</th><th style="padding:0.35rem 0.5rem">Course</th><th class="text-center" style="padding:0.35rem 0.5rem">Status</th><th class="text-right" style="padding:0.35rem 0.5rem">Media Budget Received</th><th class="text-right" style="padding:0.35rem 0.5rem">Spend</th><th class="text-right" style="padding:0.35rem 0.5rem">Remaining Budget</th></tr></thead>
                    <tbody>
                        ${body}

        $('dsiBudgetDate').value = todayStr;

        $('dsiBudgetSection').value = 'DSCE';

    function dsiEditBudgetEntry(id) {
        dsiEditingBudgetId = id;

    function dsiCancelBudgetEdit() {
        dsiEditingBudgetId = null;
        loadDSIReport();
    }

    async function dsiSaveBudgetEntry() {
        const btn = (typeof event !== 'undefined' && event) ? event.target : null;
        _setSaving(btn);
        try {
            const payload = {
                date: $('dsiBudgetDate').value,
                amount: parseFloat($('dsiBudgetAmount').value) || 0,
                invoice: $('dsiBudgetInvoice').value,
                section: $('dsiBudgetSection').value,
            };
            if (!payload.date) { toast('Date is required', true); return; }
            await api('POST', '/reports/dsi/budget-entries', payload);
            toast('Budget entry added');
            dsiEditingBudgetId = null;
            await loadDSIReport();
        } catch(e) { toast(e.message, true); }
        finally { _resetSaving(btn); }
    }

    async function dsiUpdateBudgetEntry() {
        const btn = (typeof event !== 'undefined' && event) ? event.target : null;
        _setSaving(btn);
        try {
            if (!dsiEditingBudgetId) return;
            const payload = {
                date: $('dsiBudgetDate').value,
                amount: parseFloat($('dsiBudgetAmount').value) || 0,
                invoice: $('dsiBudgetInvoice').value,
                section: $('dsiBudgetSection').value,
            };
            if (!payload.date) { toast('Date is required', true); return; }
            await api('PUT', '/reports/dsi/budget-entries/' + dsiEditingBudgetId, payload);
            toast('Budget entry updated');
            dsiEditingBudgetId = null;
            await loadDSIReport();
        } catch(e) { toast(e.message, true); }
        finally { _resetSaving(btn); }

    async function downloadDSUPDF(table) {
        try {
            const res = await fetch(API + '/reports/dsu-performance/pdf?table=' + encodeURIComponent(table), {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) throw new Error(await res.text() || 'PDF download failed');
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const disp = res.headers.get('content-disposition') || '';
            const fn = (disp.match(/filename="?([^"]+)"?/) || [null, 'DSU_' + table + '.pdf'])[1];
            a.download = fn;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);
        } catch (e) {
            toast(e.message, true);
        }
    }
